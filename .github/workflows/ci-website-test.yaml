name: Test website build

on:
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/ci-website-test.yaml'
      - '.github/actions/setup-llmd-site/**'

concurrency:
  group: ci-website-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-website:
    name: Test website build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-llmd-site
        with:
          npm-command: npm ci

      - name: Build site and check links (llmd-site ci)
        working-directory: website
        run: ./bin/llmd-site ci --warn-on-broken-links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add broken links to job summary
        if: always()
        run: |
          if [ -f website/broken-links-report.md ]; then
            cat website/broken-links-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Link check failed - no report generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload broken links report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: broken-links-report
          path: website/broken-links-report.md
          if-no-files-found: ignore
