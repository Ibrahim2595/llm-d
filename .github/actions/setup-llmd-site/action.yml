name: Setup llmd-site
description: Install Node/Go toolchain and build the llmd-site CLI for website/

inputs:
  node-version:
    description: Node.js version
    default: '20.18.1'
  go-version:
    description: Go version
    default: '1.22'
  npm-command:
    description: npm command to install website dependencies (empty to skip)
    default: 'npm ci'
  go-test:
    description: Run make test-llmd-site before site build
    default: 'true'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      if: inputs.npm-command != ''
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: website/package-lock.json

    - uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: website/tools/llmd-site/go.sum

    - name: Install npm dependencies
      if: inputs.npm-command != ''
      shell: bash
      working-directory: website
      run: ${{ inputs.npm-command }}

    - name: Build llmd-site CLI
      shell: bash
      working-directory: website
      run: make llmd-site

    - name: Run llmd-site Go tests
      if: inputs.go-test == 'true'
      shell: bash
      working-directory: website
      run: make test-llmd-site
